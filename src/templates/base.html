<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/home/">MEDISCARA Manager</a>
      <div class="navbar navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/collaborative/">Collaborative cell editor</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/industrial/">Industrial cell editor</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="http://localhost:3000">Grafana</a>
          </li>
        </ul>
        {% if user.is_authenticated %}
        <a class="btn btn-light" href="/logout/">Sign Out</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>
</body>

</html>
